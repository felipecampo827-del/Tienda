<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Tienda Online</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; text-align: center; }
        .producto { border: 1px solid #ccc; padding: 20px; margin: 20px auto; width: 300px; background: #fff; }
        .btn { background-color: #0070ba; color: white; padding: 10px 20px; border: none; cursor: pointer; font-size: 16px; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>Bienvenido a Mi Tienda Online</h1>
    <div class="producto">
        <h2>Reloj clásico</h2>
        <p>Precio: 70 USD</p>
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Wristwatch.jpg" alt="Reloj clásico">
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
            <input type="hidden" name="cmd" value="_xclick">
            <!-- Aquí pones tu correo de PayPal -->
            <input type="hidden" name="business" value="TU_CORREO_PAYPAL@ejemplo.com">
            <input type="hidden" name="item_name" value="Reloj clásico">
            <input type="hidden" name="amount" value="70.00">
            <input type="hidden" name="currency_code" value="USD">
            <input type="submit" value="Comprar con PayPal" class="btn">
        </form>
    </div>
</body>
</html>
